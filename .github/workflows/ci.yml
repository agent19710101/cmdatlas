name: ci

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify formatting
        run: test -z "$(gofmt -l .)"

      - name: Run go vet
        run: go vet ./...

      - name: Run tests
        run: go test ./...

      - name: Build cmdatlas
        run: go build -o ./bin/cmdatlas ./cmd/cmdatlas

      - name: Smoke test built binary
        run: |
          ./bin/cmdatlas --help >/dev/null
          XDG_CONFIG_HOME="$(mktemp -d)" ./bin/cmdatlas scan --json go >/dev/null

      - name: Validate README release/docs guardrails
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          python3 - <<'PY'
from pathlib import Path
import os
readme = Path('README.md').read_text()
tag = os.environ['GITHUB_REF_NAME']
expected = f"- Latest release: `{tag}`"
if expected not in readme:
    raise SystemExit(f"README Latest release line does not match tag {tag}")
if readme.count("## License") != 1:
    raise SystemExit("README should contain exactly one License section")
for required in [
    "cmdatlas profiles add NAME COMMAND [COMMAND ...]",
    "cmdatlas profiles remove NAME COMMAND [COMMAND ...]",
]:
    if required not in readme:
        raise SystemExit(f"README missing required command doc: {required}")
PY
